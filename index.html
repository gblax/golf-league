<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

  <!-- Primary Meta Tags -->
  <title>Golf One and Done League</title>
  <meta name="title" content="Golf One and Done League" />
  <meta name="description" content="Track your golf one and done league picks, standings, and results" />

  <!-- PWA Meta Tags -->
  <!-- Adaptive browser/status-bar chrome so the top edge blends with the app
       surface in each theme (parchment light, night-fairway dark). -->
  <meta name="theme-color" media="(prefers-color-scheme: light)" content="#f4f5f3" />
  <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#0b0f0d" />
  <meta name="background-color" content="#0b0f0d" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <!-- 'default' keeps the iOS status bar text readable over the app's light
       surface (black-translucent forces white text, which vanished in light
       mode). The webview then starts below the status bar in standalone. -->
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Golf League" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="msapplication-TileColor" content="#1f6f43" />
  <meta name="msapplication-tap-highlight" content="no" />

  <!-- Icons -->
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon.ico" />
  <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

  <!-- Manifest -->
  <link rel="manifest" href="/manifest.json" />

  <!-- Preconnect to Supabase -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <!-- Fonts: Inter (body) + Fraunces (clubhouse display serif for headings) -->
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <style>
    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
    }
  </style>
</head>
<body class="bg-slate-50 dark:bg-slate-950 transition-colors duration-200">
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
