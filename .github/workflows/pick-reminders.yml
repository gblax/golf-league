name: Pick Deadline Reminders

on:
  # GitHub cron has no timezone/DST support, so these UTC times are pinned to
  # Eastern Standard Time (UTC-5), matching the project's existing convention.
  # During EDT (the golf season) they land one hour later in local time.
  #
  # Both slots are kept in the afternoon/early evening on purpose. GitHub's
  # scheduled runs are frequently delayed (top-of-hour by 30 min to a few
  # hours), so a late slot creeps toward "middle of the night" — exactly the
  # 3 AM ping we're trying to avoid. The Thursday-morning pick lock leaves
  # plenty of room for an evening-before nudge without going late.
  schedule:
    # Wednesday at noon Eastern (5 PM UTC)
    - cron: '0 17 * * 3'
    # Wednesday at 6 PM Eastern (11 PM UTC) — last call the evening before the
    # Thursday lock. Even with a couple hours of cron slippage it stays in the
    # evening rather than drifting past midnight.
    - cron: '0 23 * * 3'

  # Allow manual trigger
  workflow_dispatch:

jobs:
  send-reminders:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r scripts/requirements.txt

      - name: Send pick reminders
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          VAPID_PUBLIC_KEY: ${{ secrets.VAPID_PUBLIC_KEY }}
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
          VAPID_SUBJECT: ${{ secrets.VAPID_SUBJECT }}
        run: |
          cd scripts
          python send_reminders.py
