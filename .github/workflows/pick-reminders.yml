name: Pick Deadline Reminders

on:
  # GitHub cron has no timezone/DST support, so these UTC times are pinned to
  # Eastern Standard Time (UTC-5), matching the project's existing convention.
  # During EDT (the golf season) they land one hour later in local time.
  schedule:
    # Wednesday at noon Eastern (5 PM UTC)
    - cron: '0 17 * * 3'
    # Wednesday at 8 PM Eastern (1 AM Thursday UTC)
    - cron: '0 1 * * 4'

  # Allow manual trigger
  workflow_dispatch:

jobs:
  send-reminders:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r scripts/requirements.txt

      - name: Send pick reminders
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          VAPID_PUBLIC_KEY: ${{ secrets.VAPID_PUBLIC_KEY }}
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
          VAPID_SUBJECT: ${{ secrets.VAPID_SUBJECT }}
        run: |
          cd scripts
          python send_reminders.py
