name: Update Tournament Results

on:
  # Run every Monday at 9 AM UTC (4 AM ET) — before the 10 AM UTC window cutoff
  schedule:
    - cron: '0 9 * * 1'

  # Allow manual trigger from GitHub Actions UI
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (no database changes)'
        required: false
        default: 'false'
        type: boolean
      mark_complete:
        description: 'Mark tournament as completed'
        required: false
        default: 'true'
        type: boolean
      force:
        description: 'Force apply even if catastrophic match-rate failure'
        required: false
        default: 'false'
        type: boolean

jobs:
  update-results:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests supabase python-dotenv pywebpush

      - name: Run results updater (scheduled)
        if: github.event_name == 'schedule'
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          VAPID_PUBLIC_KEY: ${{ secrets.VAPID_PUBLIC_KEY }}
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
          VAPID_SUBJECT: ${{ secrets.VAPID_SUBJECT }}
        run: |
          cd scripts
          python update_results.py --apply --complete

      - name: Run results updater (manual)
        if: github.event_name == 'workflow_dispatch'
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          VAPID_PUBLIC_KEY: ${{ secrets.VAPID_PUBLIC_KEY }}
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
          VAPID_SUBJECT: ${{ secrets.VAPID_SUBJECT }}
        run: |
          cd scripts
          FLAGS=""
          if [ "${{ inputs.dry_run }}" != "true" ]; then
            FLAGS="--apply"
            if [ "${{ inputs.mark_complete }}" == "true" ]; then
              FLAGS="$FLAGS --complete"
            fi
            if [ "${{ inputs.force }}" == "true" ]; then
              FLAGS="$FLAGS --force"
            fi
          fi
          python update_results.py $FLAGS
